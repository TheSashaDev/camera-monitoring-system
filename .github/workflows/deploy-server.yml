name: Deploy Server & Admin Panel

on:
  push:
    branches: [main, master]
    paths:
      - 'server/**'
      - 'admin-panel/**'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:

jobs:
  build-admin:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-panel/package-lock.json

      - name: Install dependencies
        run: |
          cd admin-panel
          npm ci || npm install

      - name: Build admin panel
        run: |
          cd admin-panel
          npm run build
        env:
          VITE_API_URL: ${{ vars.API_URL || 'http://localhost:3000' }}

      - name: Upload admin panel build
        uses: actions/upload-artifact@v4
        with:
          name: admin-panel-dist
          path: admin-panel/dist
          retention-days: 30

  docker-build:
    runs-on: ubuntu-latest
    needs: build-admin
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download admin panel build
        uses: actions/download-artifact@v4
        with:
          name: admin-panel-dist
          path: server/public

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: github.event_name == 'push'

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/camera-surveillance-server:latest
            ghcr.io/${{ github.repository_owner }}/camera-surveillance-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
        if: github.event_name == 'push'
