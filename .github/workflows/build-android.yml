name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Create local.properties
        run: echo "sdk.dir=$ANDROID_HOME" > android-app/local.properties

      - name: Build Debug APK
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: assembleDebug --no-daemon
          build-root-directory: android-app
          gradle-version: 8.4

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build Release APK
        uses: gradle/actions/setup-gradle@v3
        with:
          arguments: assembleRelease --no-daemon
          build-root-directory: android-app
          gradle-version: 8.4
        continue-on-error: true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-unsigned
          path: android-app/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30
        continue-on-error: true
